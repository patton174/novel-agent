<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/novel-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      ;(() => {
        const storageKey = 'na-theme'
        const mediaQuery = '(prefers-color-scheme: dark)'
        const params = new URLSearchParams(window.location.search)
        const urlTheme = params.get('theme')
        const fromUrl =
          urlTheme === 'light' || urlTheme === 'dark' || urlTheme === 'system' ? urlTheme : null
        const raw = fromUrl || localStorage.getItem(storageKey)
        const theme = raw === 'light' || raw === 'dark' || raw === 'system' ? raw : 'system'
        const dark = theme === 'dark' || (theme === 'system' && window.matchMedia(mediaQuery).matches)
        document.documentElement.classList.toggle('dark', dark)
        const urlLang = params.get('lang')
        if (urlLang === 'en' || urlLang === 'zh') {
          try {
            localStorage.setItem('novel-agent-locale', urlLang)
          } catch (_) {}
        }
      })()
    </script>
    <!-- 字体使用系统栈（fonts.ts），不依赖 Google Fonts，避免国内 ERR_CONNECTION_CLOSED -->
    <title>小说创作助手 - Novel Agent</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
