<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/novel-icon.svg" />
    <!--
      注意：不要再加 upgrade-insecure-requests CSP。
      dev server 现在跑在 https（HMR 通过 ws），CSP 会把子资源/websocket 升级到 https/wss，
      与 Vite 内部 HMR 端点不一致导致 ERR_EMPTY_RESPONSE。
      生产 build nginx 会强制 https，dev 无需此保护。
    -->
    <script>
      ;(() => {
        const storageKey = 'na-theme'
        const mediaQuery = '(prefers-color-scheme: dark)'
        const params = new URLSearchParams(window.location.search)
        const urlTheme = params.get('theme')
        const fromUrl =
          urlTheme === 'light' || urlTheme === 'dark' || urlTheme === 'system' ? urlTheme : null
        const raw = fromUrl || localStorage.getItem(storageKey)
        const theme = raw === 'light' || raw === 'dark' || raw === 'system' ? raw : 'system'
        const dark = theme === 'dark' || (theme === 'system' && window.matchMedia(mediaQuery).matches)
        document.documentElement.classList.toggle('dark', dark)
        const favicon = document.querySelector('link[rel="icon"]')
        if (favicon) {
          favicon.href = dark ? '/novel-icon-dark.svg' : '/novel-icon.svg'
        }
        const urlLang = params.get('lang')
        if (urlLang === 'en' || urlLang === 'zh') {
          try {
            localStorage.setItem('novel-agent-locale', urlLang)
          } catch (_) {}
        }
      })()
    </script>
    <!-- 字体使用系统栈（fonts.ts），不依赖 Google Fonts，避免国内 ERR_CONNECTION_CLOSED -->
    <title>Novel Agent</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
