name: Deploy pyai

on:
  push:
    branches: [main, master]
    paths:
      - 'novel-agent/agent-service/agent-pyai/**'
      - 'novel-agent/agent-common/**'
      - 'novel-agent/agent-document/docs/deploy/ci/**'
      - '.github/workflows/deploy-pyai.yml'
  workflow_dispatch:

concurrency:
  group: deploy-pyai
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/_java-deploy-reusable.yml
    secrets: inherit
    with:
      service: pyai
      target: worker
      module: agent-pyai
