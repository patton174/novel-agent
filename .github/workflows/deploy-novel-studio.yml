name: Deploy novel-studio

on:
  push:
    branches: [main, master]
    paths:
      - 'novel-studio/**'
      - '.github/workflows/deploy-novel-studio.yml'
  workflow_dispatch:

concurrency:
  group: deploy-novel-studio-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Validate secrets
        run: |
          missing=()
          [[ -n "${{ secrets.DEPLOY_SSH_KEY }}" ]] || missing+=(DEPLOY_SSH_KEY)
          [[ -n "${{ secrets.WORKER_HOST }}" ]] || missing+=(WORKER_HOST)
          [[ ${#missing[@]} -eq 0 ]] || { echo "::error::缺少 Secrets: ${missing[*]}"; exit 1; }

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.WORKER_HOST }}" >> ~/.ssh/known_hosts

      - name: Build novel-studio
        run: bash novel-studio/deploy/ci/build-studio.sh

      - name: Deploy novel-studio
        env:
          WORKER_HOST: ${{ secrets.WORKER_HOST }}
          MW_HOST: ${{ secrets.MW_HOST }}
          AGENT_INTERNAL_SERVICE_KEY: ${{ secrets.AGENT_INTERNAL_SERVICE_KEY }}
          DEPLOY_SSH_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=60 -o BatchMode=yes
          DEPLOY_SCP_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=60 -o BatchMode=yes
        run: bash novel-studio/deploy/ci/deploy-studio.sh
