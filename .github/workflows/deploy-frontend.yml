name: Deploy frontend

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - 'novel-studio/deploy/ci/build-frontend.sh'
      - 'novel-studio/deploy/ci/deploy-frontend.sh'
      - 'novel-studio/deploy/ci/register-frontend-crypto.sh'
      - 'novel-studio/deploy/docker/nginx-frontend-worker.conf.template'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Validate secrets
        run: |
          missing=()
          [[ -n "${{ secrets.DEPLOY_SSH_KEY }}" ]] || missing+=(DEPLOY_SSH_KEY)
          [[ -n "${{ secrets.WORKER_HOST }}" ]] || missing+=(WORKER_HOST)
          [[ ${#missing[@]} -eq 0 ]] || { echo "::error::缺少 Secrets: ${missing[*]}"; exit 1; }

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.WORKER_HOST }}" >> ~/.ssh/known_hosts

      - name: Build frontend
        run: bash novel-studio/deploy/ci/build-frontend.sh

      - name: Deploy frontend
        env:
          WORKER_HOST: ${{ secrets.WORKER_HOST }}
          MW_HOST: ${{ secrets.MW_HOST }}
          AGENT_INTERNAL_SERVICE_KEY: ${{ secrets.AGENT_INTERNAL_SERVICE_KEY }}
          DEPLOY_SSH_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=30 -o BatchMode=yes
          DEPLOY_SCP_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=30 -o BatchMode=yes
        run: bash novel-studio/deploy/ci/deploy-frontend.sh
