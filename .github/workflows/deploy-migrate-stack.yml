name: Migrate to novel-studio (reset + deploy all)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '输入 MIGRATE 以确认删库并全量部署'
        required: true
        type: string

concurrency:
  group: migrate-novel-studio
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Confirm destructive migration
        run: |
          [[ "${{ github.event.inputs.confirm }}" == "MIGRATE" ]] || {
            echo "::error::必须在 confirm 输入框填写 MIGRATE"
            exit 1
          }

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Validate secrets
        run: |
          missing=()
          [[ -n "${{ secrets.DEPLOY_SSH_KEY }}" ]] || missing+=(DEPLOY_SSH_KEY)
          [[ -n "${{ secrets.MW_HOST }}" ]] || missing+=(MW_HOST)
          [[ -n "${{ secrets.WORKER_HOST }}" ]] || missing+=(WORKER_HOST)
          [[ ${#missing[@]} -eq 0 ]] || { echo "::error::缺少 Secrets: ${missing[*]}"; exit 1; }

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.MW_HOST }}" >> ~/.ssh/known_hosts
          ssh-keyscan -H "${{ secrets.WORKER_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare remote env (bootstrap from legacy)
        env:
          MW_HOST: ${{ secrets.MW_HOST }}
          WORKER_HOST: ${{ secrets.WORKER_HOST }}
          DEPLOY_SSH_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=60 -o BatchMode=yes
          DEPLOY_SCP_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=60 -o BatchMode=yes
        run: bash novel-studio/deploy/ci/prepare-remote-env.sh

      - name: Reset production stack
        env:
          MW_HOST: ${{ secrets.MW_HOST }}
          WORKER_HOST: ${{ secrets.WORKER_HOST }}
          DEPLOY_SSH_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=60 -o BatchMode=yes
          DEPLOY_SCP_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=60 -o BatchMode=yes
        run: bash novel-studio/deploy/ci/reset-production.sh --yes-destroy-all

      - name: Build & deploy novel-studio
        env:
          MW_HOST: ${{ secrets.MW_HOST }}
          WORKER_HOST: ${{ secrets.WORKER_HOST }}
          DEPLOY_SSH_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=60 -o BatchMode=yes
          DEPLOY_SCP_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=60 -o BatchMode=yes
        run: |
          bash novel-studio/deploy/ci/build-studio.sh
          bash novel-studio/deploy/ci/deploy-studio.sh

      - name: Build & deploy python-ai
        env:
          MW_HOST: ${{ secrets.MW_HOST }}
          WORKER_HOST: ${{ secrets.WORKER_HOST }}
          DEPLOY_SSH_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=60 -o BatchMode=yes
          DEPLOY_SCP_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=60 -o BatchMode=yes
        run: |
          bash legacy/novel-agent/agent-document/docs/deploy/ci/build-python-ai.sh
          bash novel-studio/deploy/ci/deploy-python-ai.sh

      - name: Build & deploy frontend
        env:
          MW_HOST: ${{ secrets.MW_HOST }}
          WORKER_HOST: ${{ secrets.WORKER_HOST }}
          DEPLOY_SSH_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=60 -o BatchMode=yes
          DEPLOY_SCP_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=30 -o BatchMode=yes
        run: |
          bash novel-studio/deploy/ci/build-frontend.sh
          bash novel-studio/deploy/ci/deploy-frontend.sh
