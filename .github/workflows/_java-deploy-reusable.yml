# 可复用：GitHub 编译 Java → 传 JAR → 服务器 runtime Docker → compose up
on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      target:
        required: true
        type: string
      module:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Validate secrets
        run: |
          missing=()
          [[ -n "${{ secrets.DEPLOY_SSH_KEY }}" ]] || missing+=(DEPLOY_SSH_KEY)
          [[ -n "${{ secrets.MW_HOST }}" ]] || missing+=(MW_HOST)
          [[ -n "${{ secrets.WORKER_HOST }}" ]] || missing+=(WORKER_HOST)
          [[ ${#missing[@]} -eq 0 ]] || { echo "::error::缺少 Secrets: ${missing[*]}"; exit 1; }

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.MW_HOST }}" >> ~/.ssh/known_hosts
          ssh-keyscan -H "${{ secrets.WORKER_HOST }}" >> ~/.ssh/known_hosts

      - name: Build Java module
        run: bash novel-agent/agent-document/docs/deploy/ci/build-java.sh "${{ inputs.module }}"

      - name: Deploy to server
        env:
          MW_HOST: ${{ secrets.MW_HOST }}
          WORKER_HOST: ${{ secrets.WORKER_HOST }}
          DEPLOY_SSH_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=30 -o BatchMode=yes
          DEPLOY_SCP_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=30 -o BatchMode=yes
        run: bash novel-agent/agent-document/docs/deploy/ci/deploy-java.sh "${{ inputs.service }}" "${{ inputs.target }}"
