# push → GitHub Actions 编译 → 热替换 jar（不 rsync 全仓库、不 docker compose build）
#
# 一次性配置 Secrets（Settings → Secrets and variables → Actions）:
#   DEPLOY_SSH_KEY  能 SSH 到 MW/Worker 的私钥（与服务器 authorized_keys 对应）
#   MW_HOST         107.150.112.140
#   WORKER_HOST     47.80.80.224
#
# workflow_dispatch 手动运行：
#   - 勾选下方服务（可多选）→ 仅部署勾选项
#   - 或填写 services 文本框（逗号分隔，优先于勾选）
#   - 全部不勾且 services 为空 → 按本次 commit 变更路径自动判断
#
name: Deploy Hot (Split)

on:
  push:
    branches: [main, master]
    paths:
      - 'novel-agent/**'
      - 'frontend/**'
      - 'python-ai/**'
      - '.github/workflows/deploy-split.yml'
  workflow_dispatch:
    inputs:
      services:
        description: '逗号分隔（优先于勾选）：gateway,auth,mw-auth,pyai,content,consumer,frontend,python-ai'
        required: false
        type: string
        default: ''
      deploy_mw_auth:
        description: 'MW — gateway + auth'
        required: false
        type: boolean
        default: false
      deploy_gateway:
        description: 'MW — gateway'
        required: false
        type: boolean
        default: false
      deploy_auth:
        description: 'MW — auth'
        required: false
        type: boolean
        default: false
      deploy_pyai:
        description: 'Worker — pyai'
        required: false
        type: boolean
        default: false
      deploy_content:
        description: 'Worker — content'
        required: false
        type: boolean
        default: false
      deploy_consumer:
        description: 'Worker — consumer'
        required: false
        type: boolean
        default: false
      deploy_frontend:
        description: 'Worker — frontend'
        required: false
        type: boolean
        default: false
      deploy_python_ai:
        description: 'Worker — python-ai'
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-hot
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            gateway:
              - 'novel-agent/agent-gateway/**'
              - 'novel-agent/config/crypto-routes.yaml'
            auth:
              - 'novel-agent/agent-auth/**'
              - 'novel-agent/agent-common/agent-common-mail/**'
              - 'novel-agent/config/crypto-routes.yaml'
            pyai:
              - 'novel-agent/agent-pyai/**'
            content:
              - 'novel-agent/agent-content/**'
            consumer:
              - 'novel-agent/agent-consumer/**'
            frontend:
              - 'frontend/**'
            common:
              - 'novel-agent/agent-common/**'
              - 'novel-agent/agent-feign/**'
              - 'novel-agent/pom.xml'
            security:
              - 'novel-agent/agent-auth/**'
              - 'novel-agent/agent-gateway/**'
              - 'novel-agent/agent-common/agent-common-security/**'
              - 'novel-agent/config/crypto-routes.yaml'
              - 'frontend/src/security/**'
              - 'frontend/src/utils/authApi.ts'
            deploy_ci:
              - 'novel-agent/docs/deploy/scripts/**'
              - '.github/workflows/deploy-split.yml'
            python-ai:
              - 'python-ai/**'
              - 'novel-agent/docs/deploy/docker/Dockerfile.python-ai'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          # 不开 maven cache：post job 上传 ~/.m2 常卡 10+ 分钟

      - name: Validate deploy secrets
        run: |
          missing=()
          [[ -n "${{ secrets.DEPLOY_SSH_KEY }}" ]] || missing+=(DEPLOY_SSH_KEY)
          [[ -n "${{ secrets.MW_HOST }}" ]] || missing+=(MW_HOST)
          [[ -n "${{ secrets.WORKER_HOST }}" ]] || missing+=(WORKER_HOST)
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::缺少 GitHub Actions Secrets: ${missing[*]}"
            echo "请到 Settings → Secrets and variables → Actions 添加："
            echo "  DEPLOY_SSH_KEY  SSH 私钥全文（能 root@MW/Worker 登录）"
            echo "  MW_HOST         107.150.112.140"
            echo "  WORKER_HOST     47.80.80.224"
            exit 1
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.MW_HOST }}" >> ~/.ssh/known_hosts
          ssh-keyscan -H "${{ secrets.WORKER_HOST }}" >> ~/.ssh/known_hosts

      - name: Hot deploy changed services
        env:
          MW_HOST: ${{ secrets.MW_HOST }}
          WORKER_HOST: ${{ secrets.WORKER_HOST }}
          DEPLOY_SSH_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=30 -o ServerAliveInterval=30 -o ServerAliveCountMax=6 -o BatchMode=yes
          DEPLOY_SCP_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=30 -o BatchMode=yes
          CHANGED_GATEWAY: ${{ steps.filter.outputs.gateway }}
          CHANGED_AUTH: ${{ steps.filter.outputs.auth }}
          CHANGED_PYAI: ${{ steps.filter.outputs.pyai }}
          CHANGED_CONTENT: ${{ steps.filter.outputs.content }}
          CHANGED_CONSUMER: ${{ steps.filter.outputs.consumer }}
          CHANGED_FRONTEND: ${{ steps.filter.outputs.frontend }}
          CHANGED_COMMON: ${{ steps.filter.outputs.common }}
          CHANGED_SECURITY: ${{ steps.filter.outputs.security }}
          CHANGED_DEPLOY_CI: ${{ steps.filter.outputs.deploy_ci }}
          CHANGED_PYTHON_AI: ${{ steps.filter.outputs.python-ai }}
          FORCE_SERVICES: ${{ github.event.inputs.services }}
          FORCE_DEPLOY_MW_AUTH: ${{ github.event.inputs.deploy_mw_auth }}
          FORCE_DEPLOY_GATEWAY: ${{ github.event.inputs.deploy_gateway }}
          FORCE_DEPLOY_AUTH: ${{ github.event.inputs.deploy_auth }}
          FORCE_DEPLOY_PYAI: ${{ github.event.inputs.deploy_pyai }}
          FORCE_DEPLOY_CONTENT: ${{ github.event.inputs.deploy_content }}
          FORCE_DEPLOY_CONSUMER: ${{ github.event.inputs.deploy_consumer }}
          FORCE_DEPLOY_FRONTEND: ${{ github.event.inputs.deploy_frontend }}
          FORCE_DEPLOY_PYTHON_AI: ${{ github.event.inputs.deploy_python_ai }}
        run: bash novel-agent/docs/deploy/scripts/ci-hot-deploy.sh

      - name: Smoke test MW gateway
        if: >-
          steps.filter.outputs.auth == 'true' ||
          steps.filter.outputs.gateway == 'true' ||
          steps.filter.outputs.security == 'true' ||
          steps.filter.outputs.deploy_ci == 'true' ||
          github.event.inputs.deploy_mw_auth == 'true' ||
          github.event.inputs.deploy_gateway == 'true' ||
          github.event.inputs.deploy_auth == 'true' ||
          contains(github.event.inputs.services, 'auth') ||
          contains(github.event.inputs.services, 'gateway') ||
          contains(github.event.inputs.services, 'mw-auth')
        env:
          MW_HOST: ${{ secrets.MW_HOST }}
          DEPLOY_SSH_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=10 -o BatchMode=yes
        run: |
          code=$(ssh $DEPLOY_SSH_OPTS "root@${MW_HOST}" \
            "curl -s -o /dev/null -w '%{http_code}' --connect-timeout 3 \
              -X POST http://127.0.0.1:8080/api/auth/api/login \
              -H 'Content-Type: application/json' \
              -d '{\"username\":\"_probe\",\"password\":\"_probe\"}'" 2>/dev/null || echo 000)
          echo "gateway probe HTTP $code"
          if [[ "$code" == "000" ]]; then
            echo "::error::MW Gateway 不可达，/api 将 502"
            exit 1
          fi
