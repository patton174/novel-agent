name: Deploy content

on:
  push:
    branches: [main, master]
    paths:
      - 'novel-agent/agent-service/agent-content/**'
      - 'novel-agent/agent-common/**'
      - 'novel-agent/agent-document/docs/deploy/ci/**'
      - '.github/workflows/deploy-content.yml'
  workflow_dispatch:

concurrency:
  group: deploy-content
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/_java-deploy-reusable.yml
    secrets: inherit
    with:
      service: content
      target: worker
      module: agent-content
