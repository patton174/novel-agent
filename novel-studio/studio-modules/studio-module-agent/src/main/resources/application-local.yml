server:
  port: ${SERVER_PORT:8082}

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:changeme}
      database: ${REDIS_DB:0}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

agent:
  python:
    base-url: ${AGENT_PYTHON_BASE_URL:http://localhost:8000}
  content:
    base-url: ${CONTENT_BASE_URL:http://127.0.0.1:8091}
  billing:
    base-url: ${BILLING_BASE_URL:http://127.0.0.1:8092}
    enabled: ${BILLING_ENABLED:true}
  internal:
    service-key: ${INTERNAL_SERVICE_KEY:dev-internal-key-change-me}
  runtime:
    mode: ${AGENT_RUNTIME_MODE:queued}
    pg-run-enabled: ${AGENT_PG_RUN_ENABLED:true}
    proxy-internal-url: ${AGENT_PROXY_INTERNAL_URL:http://127.0.0.1:${SERVER_PORT:8080}}
    proxy-instance-id: ${AGENT_PROXY_INSTANCE_ID:}

logging:
  level:
    com.novel.agent: debug
