# Worker 机（2C2G）：novel-studio 单体 + python-ai + 前端
# 内存预算 ~1.0G：studio 640m + python-ai 304m + python-lb 24m + frontend 48m
name: novel-studio-worker

services:
  python-lb:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./nginx-python-lb-worker.conf:/etc/nginx/conf.d/default.conf:ro
    mem_limit: 24m
    networks:
      - novel-net
    depends_on:
      python-ai:
        condition: service_healthy

  python-ai:
    image: novel-agent/python-ai:latest
    restart: unless-stopped
    env_file:
      - ${PYTHON_AI_ENV_FILE:-/opt/novel-agent/python-ai/.env}
    environment:
      LOG_LEVEL: ${PYTHON_LOG_LEVEL:-INFO}
      CONTENT_BASE_URL: http://novel-studio:8080
      INTERNAL_SERVICE_KEY: ${AGENT_INTERNAL_SERVICE_KEY}
      CRAWL_FETCH_CONCURRENCY: ${CRAWL_FETCH_CONCURRENCY:-2}
      CRAWL_BROWSER_CONCURRENCY: ${CRAWL_BROWSER_CONCURRENCY:-1}
    mem_limit: ${PYTHON_MEM_LIMIT:-304m}
    ports:
      - "8000:8000"
    networks:
      - novel-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')\""]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 40s

  novel-studio:
    image: novel-studio/studio:latest
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: "8080"
      JAVA_OPTS: ${JAVA_OPTS_STUDIO:--Xms128m -Xmx448m -XX:MaxMetaspaceSize=192m -XX:+UseSerialGC -XX:TieredStopAtLevel=1 -XX:+ExitOnOutOfMemoryError -Dfile.encoding=UTF-8}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-novel_agent}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      PYTHON_AI_BASE_URL: ${PYTHON_AI_BASE_URL:-http://python-lb:8000}
      JWT_SECRET: ${JWT_SECRET}
      AGENT_INTERNAL_SERVICE_KEY: ${AGENT_INTERNAL_SERVICE_KEY}
      MAILTRAP_TOKEN: ${MAILTRAP_TOKEN:-}
      CLIENT_SECURITY_ENABLED: ${CLIENT_SECURITY_ENABLED:-true}
      CLIENT_SECURITY_AES_REQUIRED: ${CLIENT_SECURITY_AES_REQUIRED:-true}
      CLIENT_SECURITY_ROUTE_OBFUSCATION: ${CLIENT_SECURITY_ROUTE_OBFUSCATION:-true}
      CLIENT_SECURITY_FIELD_ENCRYPTION: ${CLIENT_SECURITY_FIELD_ENCRYPTION:-true}
      CLIENT_SECURITY_ENCRYPT_STREAM: ${CLIENT_SECURITY_ENCRYPT_STREAM:-true}
    mem_limit: ${JAVA_MEM_LIMIT_STUDIO:-640m}
    ports:
      - "8080:8080"
    networks:
      - novel-net
    depends_on:
      python-lb:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  frontend:
    image: novel-studio/frontend-worker:latest
    restart: unless-stopped
    mem_limit: 48m
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - novel-net
    depends_on:
      novel-studio:
        condition: service_started

networks:
  novel-net:
    driver: bridge
