# Worker：单 python-ai（LLM）+ 爬虫走国内 WireGuard 节点
upstream python_ai_llm {
    server python-ai:8000 max_fails=3 fail_timeout=30s;
}

upstream python_ai_crawl_cn {
    server 10.66.0.1:8000 max_fails=3 fail_timeout=30s;
}

server {
    listen 8000;
    server_name _;

    location /api/crawl/ {
        proxy_pass http://python_ai_crawl_cn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /internal/crawl/ {
        proxy_pass http://python_ai_crawl_cn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://python_ai_llm;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /health {
        proxy_pass http://python_ai_llm/api/health;
    }
}
