# 生产：客户端安全（与前端 VITE_* / GET /api/auth/crypto-config 对齐）
spring:
  flyway:
    # 单体 classpath 聚合 auth/billing/content 等同版本号迁移会冲突；schema 由 deploy CI 脚本维护
    enabled: false
  mvc:
    async:
      request-timeout: ${SPRING_MVC_ASYNC_REQUEST_TIMEOUT:3600000}

server:
  tomcat:
    connection-timeout: ${SERVER_CONNECTION_TIMEOUT:3600000}

agent:
  runtime:
    mode: ${AGENT_RUNTIME_MODE:queued}
    pg-run-enabled: ${AGENT_PG_RUN_ENABLED:true}

auth:
  cookie:
    secure: true
    domain: ${AUTH_COOKIE_DOMAIN:.novel-agent.cn}
  jwt:
    refresh-idle-ttl-seconds: ${AUTH_REFRESH_IDLE_TTL_SECONDS:604800}
    refresh-absolute-ttl-seconds: ${AUTH_REFRESH_ABSOLUTE_TTL_SECONDS:2592000}
  client-security:
    enabled: ${CLIENT_SECURITY_ENABLED:true}
    aes-required: ${CLIENT_SECURITY_AES_REQUIRED:true}
    route-obfuscation: ${CLIENT_SECURITY_ROUTE_OBFUSCATION:true}
    field-encryption: ${CLIENT_SECURITY_FIELD_ENCRYPTION:true}
    encrypt-stream: ${CLIENT_SECURITY_ENCRYPT_STREAM:true}
    replay-window-seconds: ${CLIENT_SECURITY_REPLAY_WINDOW_SECONDS:120}
    enforce-csrf: ${CLIENT_SECURITY_ENFORCE_CSRF:false}
    enforce-fingerprint: ${CLIENT_SECURITY_ENFORCE_FINGERPRINT:false}
    enforce-heartbeat: ${CLIENT_SECURITY_ENFORCE_HEARTBEAT:true}
    heartbeat-interval-seconds: ${CLIENT_SECURITY_HEARTBEAT_INTERVAL_SECONDS:60}
    heartbeat-max-silence-seconds: ${CLIENT_SECURITY_HEARTBEAT_MAX_SILENCE_SECONDS:900}
  risk:
    enabled: ${AUTH_RISK_ENABLED:true}
    step-up-threshold: ${AUTH_RISK_STEP_UP_THRESHOLD:80}
    revoke-threshold: ${AUTH_RISK_REVOKE_THRESHOLD:95}
    min-signals-for-step-up: ${AUTH_RISK_MIN_SIGNALS:2}
