# Novel Studio 单体默认配置（开发友好：直连 /api，无路由混淆）
server:
  port: ${SERVER_PORT:8080}
  tomcat:
    connection-timeout: ${SERVER_CONNECTION_TIMEOUT:3600000}

spring:
  application:
    name: novel-studio
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  main:
    web-application-type: servlet
  mvc:
    async:
      # Agent SSE 长连接：ReadMemory/WriteMemory 等工具可能静默 >30s，禁止默认 30s 中断
      request-timeout: ${SPRING_MVC_ASYNC_REQUEST_TIMEOUT:3600000}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:novel_agent}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: ${HIKARI_MINIMUM_IDLE:2}
      maximum-pool-size: ${HIKARI_MAXIMUM_POOL_SIZE:10}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:20000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:45000}
      keepalive-time: ${HIKARI_KEEPALIVE_TIME:20000}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
          batch_size: ${HIBERNATE_BATCH_SIZE:50}
        order_inserts: true
        order_updates: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public
    table: flyway_schema_history_studio
    out-of-order: true
    validate-on-migrate: false
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:50MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:55MB}

# 单体：模块间进程内直调；仅 Python AI 走 HTTP
agent:
  python:
    base-url: ${PYTHON_AI_BASE_URL:http://127.0.0.1:8000}
  billing:
    enabled: ${AGENT_BILLING_ENABLED:true}
  internal:
    service-key: ${AGENT_INTERNAL_SERVICE_KEY:${INTERNAL_SERVICE_KEY:dev-internal-key-change-me}}
    runtime:
    # legacy = Java 直连 Python /agent/run/stream；queued = MQ dispatch + Worker slice + Redis live
    mode: ${AGENT_RUNTIME_MODE:legacy}
    pg-run-enabled: ${AGENT_PG_RUN_ENABLED:false}
    proxy-internal-url: ${AGENT_PROXY_INTERNAL_URL:}
    proxy-instance-id: ${AGENT_PROXY_INSTANCE_ID:}
    warmup-enabled: ${AGENT_RUNTIME_WARMUP_ENABLED:true}
    warmup-redis-ping: ${AGENT_RUNTIME_WARMUP_REDIS:true}
    warmup-python-ping: ${AGENT_RUNTIME_WARMUP_PYTHON:true}

app:
  model:
    # base64 32-byte AES key; set MODEL_KEY_ENCRYPTION_KEY in production
    key-encryption-key: ${MODEL_KEY_ENCRYPTION_KEY:}
  upload:
    storage-dir: ${UPLOAD_STORAGE_DIR:./data/uploads}
    max-file-size: ${UPLOAD_MAX_FILE_SIZE:50MB}
    allowed-formats: [txt, md, markdown, epub, pdf, docx]
  i18n:
    enabled: true
    # LibreTranslate-compatible API base (POST {baseUrl}/translate); empty disables machine translation
    translation-base-url: ${I18N_TRANSLATION_BASE_URL:}
    translation-api-key: ${I18N_TRANSLATION_API_KEY:}
    # When true, admin site-content saves auto-translate to en (requires translation-base-url)
    auto-translate-site-content: ${I18N_AUTO_TRANSLATE_SITE_CONTENT:true}
    # Background site-CMS translation sweep interval in ms; 0 disables (default 300000 = 5 min)
    site-content-sync-interval-ms: ${I18N_SITE_CONTENT_SYNC_INTERVAL_MS:300000}
    # Max zh-CN rows translated per sweep (default 20)
    site-content-sync-batch-size: ${I18N_SITE_CONTENT_SYNC_BATCH_SIZE:20}

studio:
  security:
    client:
      # 已迁移至 auth.client-security（Servlet Filter 链）
      enabled: false

auth:
  jwt:
    issuer: novel-studio
    secret: ${JWT_SECRET:novel-studio-dev-secret-change-in-production-32chars}
    access-ttl-seconds: 3600
    refresh-idle-ttl-seconds: ${AUTH_REFRESH_IDLE_TTL_SECONDS:604800}
    refresh-absolute-ttl-seconds: ${AUTH_REFRESH_ABSOLUTE_TTL_SECONDS:2592000}
  verification:
    frontend-base-url: ${AUTH_FRONTEND_BASE_URL:https://novel-agent.cn}
    email-link-secret: ${AUTH_EMAIL_LINK_SECRET:}
    turnstile-enabled: ${TURNSTILE_ENABLED:false}
    turnstile-site-key: ${TURNSTILE_SITE_KEY:}
    turnstile-secret-key: ${TURNSTILE_SECRET_KEY:}
  client-security:
    enabled: ${CLIENT_SECURITY_ENABLED:false}
    aes-required: ${CLIENT_SECURITY_AES_REQUIRED:false}
    route-obfuscation: ${CLIENT_SECURITY_ROUTE_OBFUSCATION:false}
    field-encryption: ${CLIENT_SECURITY_FIELD_ENCRYPTION:false}
    encrypt-stream: ${CLIENT_SECURITY_ENCRYPT_STREAM:false}
    replay-window-seconds: ${CLIENT_SECURITY_REPLAY_WINDOW_SECONDS:120}
    enforce-csrf: ${CLIENT_SECURITY_ENFORCE_CSRF:false}
    enforce-fingerprint: ${CLIENT_SECURITY_ENFORCE_FINGERPRINT:false}
    enforce-heartbeat: ${CLIENT_SECURITY_ENFORCE_HEARTBEAT:false}
    heartbeat-interval-seconds: ${CLIENT_SECURITY_HEARTBEAT_INTERVAL_SECONDS:60}
    heartbeat-max-silence-seconds: ${CLIENT_SECURITY_HEARTBEAT_MAX_SILENCE_SECONDS:180}
    fingerprint-tolerance: ${CLIENT_SECURITY_FINGERPRINT_TOLERANCE:0.15}
  risk:
    enabled: ${AUTH_RISK_ENABLED:false}
    step-up-threshold: ${AUTH_RISK_STEP_UP_THRESHOLD:80}
    revoke-threshold: ${AUTH_RISK_REVOKE_THRESHOLD:95}
    min-signals-for-step-up: ${AUTH_RISK_MIN_SIGNALS:2}
    challenge-ttl-seconds: ${AUTH_RISK_CHALLENGE_TTL_SECONDS:900}

python-ai:
  base-url: ${PYTHON_AI_BASE_URL:http://localhost:8000}

mailtrap:
  token: ${MAILTRAP_TOKEN:}
  from-email: hello@noreply.novel-agent.cn
  from-name: Novel Agent

notification:
  enabled: ${NOTIFICATION_ENABLED:true}
  internal:
    base-url: ${STUDIO_INTERNAL_BASE_URL:http://127.0.0.1:${server.port:8080}}

billing:
  idatariver:
    enabled: ${IDATARIVER_ENABLED:false}
    base-url: ${IDATARIVER_BASE_URL:https://open.idatariver.com}
    merchant-secret: ${IDATARIVER_MERCHANT_SECRET:}
    project-id: ${IDATARIVER_PROJECT_ID:}
    public-base-url: ${BILLING_PUBLIC_BASE_URL:${AUTH_FRONTEND_BASE_URL:https://www.novel-agent.cn}}
    locale: ${IDATARIVER_LOCALE:zh-cn}
    default-pay-method: ${IDATARIVER_DEFAULT_PAY_METHOD:alipay}
    plan-sku-ids:
      pro: ${IDATARIVER_SKU_PRO:}

mail:
  brand:
    primary: "#4f46e5"
    product-name: Novel Agent
    tagline: 理解你的笔触与灵感
    frontend-base-url: ${AUTH_FRONTEND_BASE_URL:https://novel-agent.cn}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    cn.novelstudio: info
    org.springframework.web: warn
