# 上传到 Nacos：Data ID = agent-auth.yaml，Group = NOVEL_AGENT_GROUP，Namespace = dev
server:
  port: 8081

spring:
  cloud:
    nacos:
      discovery:
        ip: YOUR_MW_HOST
    inetutils:
      ignored-interfaces:
        - VMware.*
      preferred-networks:
        - 107.150.
  datasource:
    url: jdbc:postgresql://YOUR_MW_HOST:5432/novel_agent?sslmode=disable
    username: postgres
    password: changeme
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  data:
    redis:
      host: YOUR_MW_HOST
      port: 6379
      password: changeme
      database: 0
  rabbitmq:
    host: YOUR_MW_HOST
    port: 5672
    username: novel_agent
    password: changeme

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: false

logging:
  level:
    com.novel.agent: info
    org.hibernate.SQL: warn
