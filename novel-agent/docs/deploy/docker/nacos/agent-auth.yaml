# Docker 容器内互访用服务名；中间件走宿主机 YOUR_MW_HOST
server:
  port: 8081

spring:
  cloud:
    nacos:
      discovery:
        ip: YOUR_MW_HOST
    inetutils:
      ignored-interfaces:
        - docker0
      preferred-networks:
        - 107.150.
  datasource:
    url: jdbc:postgresql://YOUR_MW_HOST:5432/novel_agent?sslmode=disable
    username: postgres
    password: changeme
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  data:
    redis:
      host: YOUR_MW_HOST
      port: 6379
      password: changeme
      database: 0
  rabbitmq:
    host: YOUR_MW_HOST
    port: 5672
    username: novel_agent
    password: changeme

auth:
  jwt:
    issuer: novel-agent
    secret: ${JWT_SECRET:novel-agent-dev-secret-change-in-production-32}
    access-ttl-seconds: 3600
    refresh-ttl-seconds: 2592000
  cookie:
    secure: true
  client-security:
    enabled: true
    aes-required: true
    encrypt-stream: false
    replay-window-seconds: 120
    ws-ticket-ttl-seconds: 60
    heartbeat-interval-seconds: 60
    heartbeat-max-silence-seconds: 180
    fingerprint-tolerance: 0.15
    enforce-fingerprint: false
    enforce-heartbeat: false
    enforce-csrf: false
  verification:
    email-code-ttl-seconds: 600
    email-cooldown-seconds: 60
    email-daily-limit: 5

mailtrap:
  token: ${MAILTRAP_TOKEN:}
  from-email: hello@noreply.novel-agent.cn
  from-name: Novel Agent

logging:
  level:
    com.novel.agent: info
    org.hibernate.SQL: warn
