# 双机：MW 机 Gateway
server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  cloud:
    nacos:
      discovery:
        ip: YOUR_MW_HOST
    inetutils:
      ignored-interfaces:
        - docker0
      preferred-networks:
        - 107.150.
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: auth-route
          uri: lb://agent-auth
          predicates:
            - Path=/api/auth/**
        - id: pyai-route
          uri: lb://agent-pyai
          predicates:
            - Path=/api/agent/**
        - id: content-route
          uri: lb://agent-content
          predicates:
            - Path=/api/content/**
  data:
    redis:
      host: YOUR_MW_HOST
      port: 6379
      password: changeme
      database: 0

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: false

logging:
  level:
    com.novel.agent: info
    org.springframework.cloud.gateway: info
