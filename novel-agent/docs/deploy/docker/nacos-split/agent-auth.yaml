# 双机：MW 机 Auth（PG/Redis/MQ 在 MW）
server:
  port: 8081

spring:
  cloud:
    nacos:
      discovery:
        ip: YOUR_MW_HOST
    inetutils:
      ignored-interfaces:
        - docker0
      preferred-networks:
        - 107.150.
  datasource:
    url: jdbc:postgresql://YOUR_MW_HOST:5432/novel_agent?sslmode=disable
    username: postgres
    password: YOUR_DB_PASSWORD
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: YOUR_MW_HOST
      port: 6379
      password: YOUR_REDIS_PASSWORD
      database: 0
  rabbitmq:
    host: YOUR_MW_HOST
    port: 5672
    username: novel_agent
    password: YOUR_RMQ_PASSWORD

auth:
  jwt:
    issuer: novel-agent
    secret: ${JWT_SECRET:YOUR_JWT_SECRET_MIN_32_CHARS}
    access-ttl-seconds: 3600
    refresh-ttl-seconds: 2592000
  cookie:
    secure: true
    domain: .novel-agent.cn
  client-security:
    enabled: false
    aes-required: false
    encrypt-stream: false
    replay-window-seconds: 120
    ws-ticket-ttl-seconds: 60
    heartbeat-interval-seconds: 60
    heartbeat-max-silence-seconds: 180
    fingerprint-tolerance: 0.15
    enforce-fingerprint: false
    enforce-heartbeat: false
    enforce-csrf: false

logging:
  level:
    com.novel.agent: info
