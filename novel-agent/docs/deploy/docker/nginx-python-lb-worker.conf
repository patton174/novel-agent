# Worker 内网 python-ai 双实例负载均衡（least_conn）
upstream python_ai_cluster {
    least_conn;
    server python-ai:8000 max_fails=3 fail_timeout=30s;
    server python-ai-2:8000 max_fails=3 fail_timeout=30s;
}

server {
    listen 8000;
    server_name _;

    location / {
        proxy_pass http://python_ai_cluster;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /health {
        proxy_pass http://python_ai_cluster/api/health;
    }
}
