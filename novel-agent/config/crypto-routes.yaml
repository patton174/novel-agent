# 统一 API 路由清单（/api/{service}/{audience}/... + Result<T>）
routes:
  # auth — 公开 api
  - method: POST
    path: /api/auth/api/login
  - method: POST
    path: /api/auth/api/register
  - method: POST
    path: /api/auth/api/refresh
  - method: POST
    path: /api/auth/api/logout
  - method: POST
    path: /api/auth/api/captcha/slider
  - method: POST
    path: /api/auth/api/captcha/slider/verify
  - method: POST
    path: /api/auth/api/send-email-code
  - method: GET
    path: /api/auth/crypto-manifest
  - method: GET
    path: /api/auth/crypto-config

  # auth — 用户 auth
  - method: POST
    path: /api/auth/auth/heartbeat
  - method: POST
    path: /api/auth/auth/ws-ticket
  - method: GET
    path: /api/auth/auth/info

  # auth — 管理 crm
  - method: GET
    path: /api/auth/crm/stats/overview
  - method: GET
    path: /api/auth/crm/user/page
  - method: GET
    path: /api/auth/crm/user/{id}
  - method: PUT
    path: /api/auth/crm/user/{id}

  # content — 用户 auth novels / chapters / volumes
  - method: GET
    path: /api/content/auth/novels
  - method: POST
    path: /api/content/auth/novels
  - method: GET
    path: /api/content/auth/novels/{novelId}
  - method: PUT
    path: /api/content/auth/novels/{novelId}
  - method: DELETE
    path: /api/content/auth/novels/{novelId}
