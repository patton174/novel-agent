    path: /api/content/auth/novels/{novelId}/chapters
  - method: POST
    path: /api/content/auth/novels/{novelId}/chapters/reorder
  - method: POST
    path: /api/content/auth/novels/{novelId}/reindex
  - method: GET
    path: /api/content/auth/novels/{novelId}/reindex/status
  - method: GET
    path: /api/content/auth/novels/{novelId}/sessions
  - method: GET
    path: /api/content/auth/novels/{novelId}/volumes
  - method: POST
    path: /api/content/auth/novels/{novelId}/volumes
  - method: POST
    path: /api/content/auth/novels/{novelId}/volumes/reorder
  - method: GET
    path: /api/content/auth/novels/{novelId}/search
  - method: GET
    path: /api/content/auth/novels/{novelId}/agent-context
  - method: DELETE
    path: /api/content/auth/volumes/{volumeId}
  - method: PUT
    path: /api/content/auth/volumes/{volumeId}
  - method: POST
    path: /api/content/auth/volumes/{volumeId}/chapters/reorder
  - method: GET
    path: /api/content/auth/chapters/{chapterId}
  - method: PUT
    path: /api/content/auth/chapters/{chapterId}
  - method: DELETE
    path: /api/content/auth/chapters/{chapterId}
  - method: GET
    path: /api/content/auth/chapters/{chapterId}/versions
  - method: POST
    path: /api/content/auth/chapters/{chapterId}/versions/{versionId}/restore

  # content — dashboard
  - method: GET
    path: /api/content/auth/dashboard/summary
  - method: GET
    path: /api/content/auth/dashboard/recent-novels

  # content — sessions
  - method: GET
    path: /api/content/auth/sessions
  - method: POST
    path: /api/content/auth/sessions/upsert
  - method: GET
    path: /api/content/auth/sessions/{sessionId}
  - method: PUT
    path: /api/content/auth/sessions/{sessionId}
  - method: DELETE
    path: /api/content/auth/sessions/{sessionId}
  - method: POST
    path: /api/content/auth/sessions/batch-delete
  - method: GET
    path: /api/content/auth/sessions/{sessionId}/messages
  - method: PUT
    path: /api/content/auth/sessions/{sessionId}/runs/{runId}/trace

  # content — crm
  - method: GET
    path: /api/content/crm/stats/overview
  - method: GET
    path: /api/content/crm/stats/trends

  # agent / pyai
  - method: POST
    path: /api/agent/chat/stream
  - method: POST
    path: /api/agent/session/title
