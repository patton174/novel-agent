# Worker 机（2C2G / 物理 ~1.8G）
# 内存预算（mem_limit 合计 ~1.0G；consumer/billing 已迁 MW，爬虫走国内节点）
#   python-ai 304m（仅 LLM）+ content 368m + pyai 240m + python-lb 24m + frontend 48m
# 调优：docker-compose.worker.yml 默认 + .env.worker 覆盖；变更后需 recreate 容器
name: novel-agent-worker

x-java-env: &java-env
  SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
  NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR}
  NACOS_USERNAME: ${NACOS_USERNAME}
  NACOS_PASSWORD: ${NACOS_PASSWORD}
  NACOS_NAMESPACE: ${NACOS_NAMESPACE}
  NACOS_DISCOVERY_IP: ${HOST_IP}
  MW_HOST: ${MW_HOST}
  SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST}
  SPRING_DATA_REDIS_PASSWORD: ${SPRING_DATA_REDIS_PASSWORD}
  SPRING_RABBITMQ_HOST: ${SPRING_RABBITMQ_HOST}
  SPRING_RABBITMQ_USERNAME: ${SPRING_RABBITMQ_USERNAME}
  SPRING_RABBITMQ_PASSWORD: ${SPRING_RABBITMQ_PASSWORD}

services:
  python-lb:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./nginx-python-lb-worker.conf:/etc/nginx/conf.d/default.conf:ro
    mem_limit: 24m
    networks:
      - novel-net
    depends_on:
      python-ai:
        condition: service_healthy

  python-ai:
    image: novel-agent/python-ai:latest
    restart: unless-stopped
    env_file:
      - ../../../../../python-ai/.env
    environment:
      LOG_LEVEL: ${PYTHON_LOG_LEVEL:-INFO}
      CONTENT_BASE_URL: http://agent-content:8091
      CRAWL_FETCH_CONCURRENCY: ${CRAWL_FETCH_CONCURRENCY:-2}
      CRAWL_BROWSER_CONCURRENCY: ${CRAWL_BROWSER_CONCURRENCY:-1}
    mem_limit: ${PYTHON_MEM_LIMIT:-304m}
    ports:
      - "8000:8000"
    networks:
      - novel-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')\""]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 40s

  agent-content:
    image: novel-agent/content:latest
    restart: unless-stopped
    environment:
      <<: *java-env
      # Nacos server.port 在启动后才刷新，须显式指定以免默认 8080 与 8091 映射不一致
      SERVER_PORT: "8091"
      JAVA_OPTS: ${JAVA_OPTS_CONTENT:--Xms64m -Xmx228m -XX:MaxMetaspaceSize=120m -XX:+UseSerialGC -XX:TieredStopAtLevel=1 -XX:+ExitOnOutOfMemoryError -Dfile.encoding=UTF-8}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      AGENT_PYTHON_BASE_URL: ${AGENT_PYTHON_BASE_URL}
    mem_limit: ${JAVA_MEM_LIMIT_CONTENT:-368m}
    ports:
      - "8091:8091"
    networks:
      - novel-net
    depends_on:
      python-lb:
        condition: service_started

  agent-pyai:
    image: novel-agent/pyai:latest
    restart: unless-stopped
    environment:
      <<: *java-env
      JAVA_OPTS: ${JAVA_OPTS_PYAI:--Xms48m -Xmx160m -XX:MaxMetaspaceSize=80m -XX:MaxDirectMemorySize=48m -XX:+UseSerialGC -XX:TieredStopAtLevel=1 -XX:+ExitOnOutOfMemoryError -Dfile.encoding=UTF-8}
      SPRING_MAIN_WEB_APPLICATION_TYPE: reactive
      AGENT_PYTHON_BASE_URL: ${AGENT_PYTHON_BASE_URL}
      AGENT_CONTENT_BASE_URL: ${AGENT_CONTENT_BASE_URL}
      BILLING_BASE_URL: ${BILLING_BASE_URL:-http://${MW_HOST}:8092}
      BILLING_ENABLED: ${BILLING_ENABLED:-true}
    mem_limit: ${JAVA_MEM_LIMIT_PYAI:-240m}
    ports:
      - "8082:8082"
    networks:
      - novel-net
    depends_on:
      agent-content:
        condition: service_started
      python-lb:
        condition: service_started

  frontend:
    image: novel-agent/frontend-worker:latest
    restart: unless-stopped
    mem_limit: 48m
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - novel-net
    depends_on:
      agent-content:
        condition: service_started

networks:
  novel-net:
    driver: bridge
