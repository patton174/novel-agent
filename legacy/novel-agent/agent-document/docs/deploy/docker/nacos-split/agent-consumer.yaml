# MW 机 Consumer（MQ/Redis 在 MW；Content/Python 在 Worker）
server:
  port: 8090

spring:
  cloud:
    nacos:
      discovery:
        ip: YOUR_MW_HOST
    inetutils:
      ignored-interfaces:
        - docker0
      preferred-networks:
        - 107.150.
  data:
    redis:
      host: YOUR_MW_HOST
      port: 6379
      password: YOUR_REDIS_PASSWORD
      database: 0
  rabbitmq:
    host: YOUR_MW_HOST
    port: 5672
    username: novel_agent
    password: YOUR_RMQ_PASSWORD

logging:
  level:
    com.novel.agent: info

agent:
  content:
    base-url: http://WORKER_HOST_PLACEHOLDER:8091
  python:
    base-url: http://python-lb:8000
  internal:
    service-key: prod-internal-key-novel-agent
