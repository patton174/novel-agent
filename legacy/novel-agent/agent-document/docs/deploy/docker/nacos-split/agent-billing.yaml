# MW 机 Billing（PG/Redis 在 MW）
server:
  port: 8092

spring:
  cloud:
    nacos:
      discovery:
        ip: YOUR_MW_HOST
    inetutils:
      ignored-interfaces:
        - docker0
      preferred-networks:
        - 107.150.
  datasource:
    url: jdbc:postgresql://YOUR_MW_HOST:5432/novel_agent?sslmode=disable
    username: postgres
    password: YOUR_DB_PASSWORD
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: YOUR_MW_HOST
      port: 6379
      password: YOUR_REDIS_PASSWORD
      database: 0
  rabbitmq:
    host: YOUR_MW_HOST
    port: 5672
    username: novel_agent
    password: YOUR_RMQ_PASSWORD

logging:
  level:
    com.novel.agent: info

agent:
  internal:
    service-key: prod-internal-key-novel-agent
