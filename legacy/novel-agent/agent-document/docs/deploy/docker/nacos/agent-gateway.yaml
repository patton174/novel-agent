server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  cloud:
    nacos:
      discovery:
        ip: YOUR_MW_HOST
    inetutils:
      ignored-interfaces:
        - docker0
      preferred-networks:
        - 107.150.
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: auth-route
          uri: lb://agent-auth
          predicates:
            - Path=/api/auth/**
        - id: pyai-route
          uri: lb://agent-pyai
          predicates:
            - Path=/api/agent/**
        - id: content-route
          uri: lb://agent-content
          predicates:
            - Path=/api/content/**
        - id: billing-route
          uri: lb://agent-billing
          predicates:
            - Path=/api/billing/**
  data:
    redis:
      host: YOUR_MW_HOST
      port: 6379
      password: changeme
      database: 0

auth:
  jwt:
    issuer: novel-agent
    secret: ${JWT_SECRET:novel-agent-dev-secret-change-in-production-32}
    access-ttl-seconds: 3600
  client-security:
    enabled: true
    aes-required: true
    route-obfuscation: true
    field-encryption: true
    encrypt-stream: true
    replay-window-seconds: 120
    enforce-csrf: false
    heartbeat-max-silence-seconds: 180
    fingerprint-tolerance: 0.15
    enforce-fingerprint: false
    enforce-heartbeat: false

logging:
  level:
    com.novel.agent: info
    org.springframework.cloud.gateway: info
