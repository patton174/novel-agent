server:
  port: 8082

spring:
  cloud:
    nacos:
      discovery:
        ip: YOUR_MW_HOST
    inetutils:
      ignored-interfaces:
        - docker0
      preferred-networks:
        - 107.150.
  main:
    web-application-type: reactive
  data:
    redis:
      host: YOUR_MW_HOST
      port: 6379
      password: changeme
