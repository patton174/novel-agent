# 双机：MW 机 Auth（PG/Redis/MQ 在 MW）
server:
  port: 8081

spring:
  cloud:
    nacos:
      discovery:
        ip: 107.150.112.140
    inetutils:
      ignored-interfaces:
        - docker0
      preferred-networks:
        - 107.150.
  datasource:
    url: jdbc:postgresql://107.150.112.140:5432/novel_agent?sslmode=disable
    username: postgres
    password: LIxu20021008@
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: 107.150.112.140
      port: 6379
      password: LIxu20021008@
      database: 0
  rabbitmq:
    host: 107.150.112.140
    port: 5672
    username: novel_agent
    password: LIxu20021008@

auth:
  jwt:
    issuer: novel-agent
    secret: ${JWT_SECRET:novel-agent-dev-secret-change-in-production-32}
    access-ttl-seconds: 3600
    refresh-ttl-seconds: 2592000
  cookie:
    secure: true
    domain: .novel-agent.cn
  client-security:
    enabled: true
    aes-required: true
    encrypt-stream: false
    replay-window-seconds: 120
    ws-ticket-ttl-seconds: 60
    heartbeat-interval-seconds: 60
    heartbeat-max-silence-seconds: 180
    fingerprint-tolerance: 0.15
    enforce-fingerprint: false
    enforce-heartbeat: false
    enforce-csrf: false
  verification:
    frontend-base-url: https://www.novel-agent.cn
    email-link-secret: ${AUTH_EMAIL_LINK_SECRET:}

mail:
  brand:
    primary: "#4f46e5"
    primary-dark: "#4338ca"
    gradient-end: "#6366f1"
    background: "#f1f5f9"
    surface: "#ffffff"
    text: "#0f172a"
    muted: "#64748b"
    border: "#e2e8f0"
    product-name: Novel Agent
    tagline: 理解你的笔触与灵感
    logo-url: https://www.novel-agent.cn/favicon.svg
    support-email: hello@noreply.novel-agent.cn
    frontend-base-url: https://www.novel-agent.cn

mailtrap:
  token: ${MAILTRAP_TOKEN:}
  from-email: hello@noreply.novel-agent.cn
  from-name: Novel Agent

agent:
  python:
    base-url: ${AGENT_PYTHON_BASE_URL:http://python-lb:8000}
  image:
    timeout-seconds: 120
    captcha-enabled: true
    captcha-size: 1024x768

logging:
  level:
    com.novel.agent: info
