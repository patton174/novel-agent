    nacos:
      discovery:
        ip: 47.80.80.224
    inetutils:
      ignored-interfaces:
        - docker0
  main:
    web-application-type: reactive
  data:
    redis:
      host: 107.150.112.140
      port: 6379
      password: LIxu20021008@
      database: 0
  rabbitmq:
    host: 107.150.112.140
